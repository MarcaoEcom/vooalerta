<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VooAlerta</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f11;--sur:#16181c;--sur2:#1e2026;--bdr:#2a2d35;
  --txt:#e8eaf0;--mut:#6b7280;
  --blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh}
.shell{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.logo{font-family:var(--mono);font-size:20px;font-weight:500;letter-spacing:-.5px}
.logo em{color:var(--blue);font-style:normal}
.live{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--mut)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:16px}
.ml{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:6px}
.mv{font-family:var(--mono);font-size:26px;font-weight:500}
.mv.b{color:var(--blue)}.mv.g{color:var(--green)}.mv.a{color:var(--amber)}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.srch{flex:1;min-width:180px;background:var(--sur);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);padding:8px 14px;font-size:13px;font-family:var(--font);outline:none}
.srch:focus{border-color:var(--blue)}
.fbtn{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;color:var(--mut);padding:7px 14px;font-size:12px;cursor:pointer;font-family:var(--mono);transition:all .15s}
.fbtn:hover{border-color:var(--blue);color:var(--blue)}
.fbtn.on{background:rgba(59,130,246,.12);border-color:var(--blue);color:var(--blue)}
.twrap{border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--sur);color:var(--mut);font-weight:500;padding:10px 14px;text-align:left;border-bottom:1px solid var(--bdr);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
tbody td{padding:12px 14px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--sur)}
.rm{font-family:var(--mono);font-weight:500;font-size:13px}
.rs{font-size:11px;color:var(--mut);margin-top:3px}
.chip{background:var(--sur2);border:1px solid var(--bdr);border-radius:999px;padding:2px 10px;font-size:11px;color:var(--mut);font-family:var(--mono)}
.best{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--green)}
.po{color:var(--mut);text-decoration:line-through;font-size:11px;font-family:var(--mono)}
.pn{font-family:var(--mono);font-size:14px;font-weight:500;margin-top:2px}
.plevel{font-size:10px;margin-top:3px;font-family:var(--mono)}
.plevel.low{color:var(--green)}.plevel.typical{color:var(--mut)}.plevel.high{color:var(--red)}
.disc{border-radius:999px;padding:2px 9px;font-size:11px;font-family:var(--mono);font-weight:500}
.disc.lo{background:rgba(34,197,94,.12);color:var(--green)}
.wabtn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:rgba(37,211,102,.15);border:1px solid rgba(37,211,102,.3);cursor:pointer;transition:all .15s;text-decoration:none}
.wabtn:hover{background:rgba(37,211,102,.3);border-color:rgba(37,211,102,.6);transform:scale(1.1)}
.wabtn svg{width:16px;height:16px;fill:#25d366}
.disc.hi{background:rgba(245,158,11,.12);color:var(--amber)}
.disc.vhi{background:rgba(239,68,68,.12);color:var(--red)}
.disc.na{background:var(--sur2);color:var(--mut)}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}
.sdot.ativo{background:var(--green)}.sdot.expirado{background:var(--mut)}
.badge{border-radius:999px;padding:2px 9px;font-size:11px;font-family:var(--mono)}
.badge.s{background:rgba(59,130,246,.12);color:var(--blue)}
.badge.p{background:rgba(245,158,11,.12);color:var(--amber)}
.empty{text-align:center;padding:3rem;color:var(--mut);font-size:14px}
.footer{margin-top:1.5rem;text-align:center;font-size:11px;color:var(--mut);font-family:var(--mono)}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo">voo<em>alerta</em></div>
    <div class="live"><span class="dot"></span><span id="upd">carregando...</span></div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="ml">voos encontrados</div><div class="mv b" id="m1">—</div></div>
    <div class="metric"><div class="ml">enviados hoje</div><div class="mv g" id="m2">—</div></div>
    <div class="metric"><div class="ml">maior desconto</div><div class="mv a" id="m3">—</div></div>
    <div class="metric"><div class="ml">desc. mínimo</div><div class="mv" id="m4">—</div></div>
  </div>
  <div class="filters">
    <input class="srch" id="srch" placeholder="buscar cidade, rota ou cia aérea..." oninput="render()"/>
    <button class="fbtn on" onclick="setF('todos',this)">todos</button>
    <button class="fbtn" onclick="setF('ativo',this)">ativos</button>
    <button class="fbtn" onclick="setF('enviado',this)">enviados</button>
    <button class="fbtn" onclick="setF('pendente',this)">pendentes</button>
  </div>
  <div class="twrap">
    <table>
      <thead><tr>
        <th>rota</th><th>cia aérea</th><th>data</th><th>hora</th>
        <th>duração</th><th>preço</th><th>desconto</th><th>whatsapp</th>
      </tr></thead>
      <tbody id="tbody"><tr><td colspan="8" class="empty">carregando voos...</td></tr></tbody>
    </table>
  </div>
  <div class="footer">google flights via fast-flights &nbsp;·&nbsp; atualiza a cada 5 min</div>
</div>
<script>
let all=[], filt='todos';

async function load(){
  try{
    const [s,f]=await Promise.all([fetch('/api/stats'),fetch('/api/flights')]);
    const st=await s.json(), fd=await f.json();
    document.getElementById('m1').textContent=st.total;
    document.getElementById('m2').textContent=st.sent;
    document.getElementById('m3').textContent=st.max_disc+'%';
    document.getElementById('m4').textContent=st.min_cfg+'%';
    const d=new Date(fd.updated_at);
    document.getElementById('upd').textContent='atualizado '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    all=fd.flights; render();
  }catch(e){
    document.getElementById('tbody').innerHTML='<tr><td colspan="8" class="empty">erro ao conectar — verifique se o backend está rodando</td></tr>';
  }
}

function setF(f,el){
  filt=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); render();
}

function dc(d){return d>=40?'vhi':d>=30?'hi':d>0?'lo':'na'}

function waLink(f){
  const airline = f.airline && f.airline !== 'Unknown' ? f.airline : 'companhia aérea';
  const stops = f.stops === 0 ? '✈️ voo direto' : `🔄 ${f.stops} parada(s)`;
  const duration = f.duration && f.duration !== '—' ? ` · ${f.duration}` : '';

  const discountLine = f.price_level === 'low'
    ? '🔥 *Preço até 30% abaixo do normal!*'
    : '💡 *Preço dentro da média do mercado*';

  const msg =
`✈️ *VOO COM DESCONTO!*

🛫 *${f.origin_city} → ${f.dest_city}*
📅 Dia *${f.date}* às *${f.time}*
🏢 ${airline}
${stops}${duration}

${discountLine}

⚡ Corre que é por tempo limitado!`;

  const encoded = encodeURIComponent(msg);
  return `https://web.whatsapp.com/send?text=${encoded}`;
}

function waIcon(){
  return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
}

function render(){
  const q=document.getElementById('srch').value.toLowerCase();
  let data=all.filter(f=>{
    const m=(f.origin_city+f.dest_city+f.airline).toLowerCase().includes(q);
    if(!m)return false;
    if(filt==='ativo')return f.status==='ativo';
    if(filt==='enviado')return f.sent;
    if(filt==='pendente')return !f.sent&&f.status==='ativo';
    return true;
  });
  const b=document.getElementById('tbody');
  if(!data.length){b.innerHTML='<tr><td colspan="8" class="empty">nenhum voo encontrado</td></tr>';return;}
  b.innerHTML=data.map(f=>`<tr>
    <td><div class="rm">${f.origin} → ${f.destination}</div><div class="rs">${f.origin_city} → ${f.dest_city}</div></td>
    <td><span class="chip ${f.is_best?'best':''}">${f.airline||'—'}</span></td>
    <td>${f.date}</td>
    <td style="font-family:var(--mono)">${f.time||'—'}</td>
    <td style="color:var(--mut);font-size:12px">${f.duration||'—'} · ${f.stops===0?'direto':f.stops+' parada'}</td>
    <td>
      ${f.discount>0?`<div class="po">R$ ${f.price_orig}</div>`:''}
      <div class="pn">R$ ${f.price}</div>
      <div class="plevel ${f.price_level}">${f.price_level==='low'?'preço baixo':f.price_level==='high'?'preço alto':'típico'}</div>
    </td>
    <td><span class="disc ${dc(f.discount)}">${f.discount>0?f.discount+'%':'—'}</span></td>
    <td><a class="wabtn" href="${waLink(f)}" target="_blank" title="Enviar no WhatsApp">${waIcon()}</a></td>
  </tr>`).join('');
}

load(); setInterval(load,300000);
</script>
</body>
</html>
